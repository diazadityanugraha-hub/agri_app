workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      flutter: 3.41.9
    scripts:
      - name: Fix Kotlin and Build
        script: |
          flutter pub get
          cd android
          perl -i -pe 's/version "1\.9\.24"/version "2.1.0"/g' settings.gradle.kts
          cd ..
          flutter build apk --release --android-skip-build-dependency-validation
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk